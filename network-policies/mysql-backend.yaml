apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-allow-backend
  namespace: expense
spec:
  podSelector:
    matchLabels:
      app: mysql
      tier: mysql
      project: expense
  policyTypes:
    - ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
              tier: backend
              project: expense
      ports:
        - protocol: TCP
          port: 8080
